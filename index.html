<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iron Forge VR - Shapes Version</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-hand-tracking-component@1.0.2/dist/aframe-hand-tracking-component.min.js"></script>
</head>
<body>
<a-scene vr-mode-ui="enabled: true" background="color: #000000" hand-tracking="hands: all">

  <!-- Environment -->
  <a-entity environment="preset: warehouse; groundColor: #222; skyColor: #111;"></a-entity>

  <!-- Player Camera & HUD -->
  <a-entity id="player" position="0 1.6 0">
    <a-camera>
      <a-entity id="hud" position="0 -0.2 -0.5" text="value: Crafting Points: 0\nArmor Progress:\nHelmet: 0/50\nChest: 0/100\nArms: 0/80\nLegs: 0/80\nBoots: 0/40; color: #0f0; width: 2"></a-entity>
    </a-camera>
  </a-entity>

  <!-- Armor pieces (colored shapes) -->
  <a-box id="helmet" visible="false" position="0 1.7 0" depth="0.3" height="0.2" width="0.3" color="#ff0000"></a-box>
  <a-box id="chest" visible="false" position="0 1.5 0" depth="0.4" height="0.4" width="0.4" color="#ff8000"></a-box>
  <a-box id="arms" visible="false" position="0 1.5 0" depth="0.15" height="0.4" width="0.4" color="#ffff00"></a-box>
  <a-box id="legs" visible="false" position="0 1.0 0" depth="0.3" height="0.4" width="0.3" color="#00ff00"></a-box>
  <a-box id="boots" visible="false" position="0 0.5 0" depth="0.3" height="0.2" width="0.3" color="#00ffff"></a-box>

  <!-- Hammer (cylinder) -->
  <a-cylinder id="hammer" position="0.5 1.4 -0.5" radius="0.05" height="0.5" color="#8888ff" rotation="90 0 0"></a-cylinder>

  <!-- Targets -->
  <a-box class="target" position="2 1 -3" depth="0.5" height="0.5" width="0.5" color="#f00"></a-box>
  <a-box class="target" position="-2 1 -3" depth="0.5" height="0.5" width="0.5" color="#f00"></a-box>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="20" height="20" color="#333"></a-plane>

  <!-- Options Menu -->
  <a-entity id="menu" position="0 1 -1" visible="false">
    <a-plane width="1" height="1" color="#222" opacity="0.8"></a-plane>
    <a-text value="Options Menu\nLeft hand: Teleport\nRight hand pinch: Toggle armor\nUse hammer to hit targets" color="#0f0" position="-0.45 0.3 0"></a-text>
  </a-entity>

  <!-- Teleport Marker -->
  <a-sphere id="teleportMarker" radius="0.1" color="cyan" opacity="0.5" visible="false"></a-sphere>

  <!-- Hand Tracking -->
  <a-entity hand-tracking-controls="hand: left"></a-entity>
  <a-entity hand-tracking-controls="hand: right"></a-entity>

  <script>
    const armorPieces = {
      helmet: {el: document.querySelector('#helmet'), points: 0, needed: 50},
      chest: {el: document.querySelector('#chest'), points: 0, needed: 100},
      arms: {el: document.querySelector('#arms'), points: 0, needed: 80},
      legs: {el: document.querySelector('#legs'), points: 0, needed: 80},
      boots: {el: document.querySelector('#boots'), points: 0, needed: 40},
    };
    let craftingPoints = 0;
    const hud = document.querySelector('#hud');
    const targets = document.querySelectorAll('.target');
    const menu = document.querySelector('#menu');
    const player = document.querySelector('#player');
    const teleportMarker = document.querySelector('#teleportMarker');
    let teleporting = false;
    let teleportPos = null;

    function updateHUD() {
      hud.setAttribute('text', 'value',
        `Crafting Points: ${craftingPoints}\nArmor Progress:\n` +
        `Helmet: ${armorPieces.helmet.points}/${armorPieces.helmet.needed}\n` +
        `Chest: ${armorPieces.chest.points}/${armorPieces.chest.needed}\n` +
        `Arms: ${armorPieces.arms.points}/${armorPieces.arms.needed}\n` +
        `Legs: ${armorPieces.legs.points}/${armorPieces.legs.needed}\n` +
        `Boots: ${armorPieces.boots.points}/${armorPieces.boots.needed}`);
    }

    AFRAME.registerComponent('hand-interaction', {
      tick: function () {
        const leftHand = document.querySelector('[hand-tracking-controls][hand="left"]');
        const rightHand = document.querySelector('[hand-tracking-controls][hand="right"]');

        // Right-hand pinch toggles all armor visibility
        if (rightHand && rightHand.components['hand-tracking'].pinch) {
          for (const key in armorPieces) {
            armorPieces[key].el.setAttribute('visible', true);
          }
        }

        // Left-hand pinch toggles menu
        if (leftHand && leftHand.components['hand-tracking'].pinch) {
          menu.setAttribute('visible', !menu.getAttribute('visible'));
        }

        // Hammer hits targets
        targets.forEach(target => {
          if (rightHand) {
            const handPos = rightHand.object3D.position;
            const targetPos = target.object3D.position;
            if (handPos.distanceTo(targetPos) < 0.25) {
              target.setAttribute('color', '#0f0');
              craftingPoints += 10;
              for (const key in armorPieces) {
                if (armorPieces[key].points < armorPieces[key].needed) {
                  armorPieces[key].points += 10;
                  if (armorPieces[key].points > armorPieces[key].needed) armorPieces[key].points = armorPieces[key].needed;
                  armorPieces[key].el.setAttribute('visible', armorPieces[key].points >= armorPieces[key].needed);
                  break;
                }
              }
              updateHUD();
            }
          }
        });

        // Teleport (left-hand thumb-middle)
        if (leftHand && leftHand.components['hand-tracking'].thumbMiddle) {
          const handPos = leftHand.object3D.position;
          const forward = new THREE.Vector3(0,0,-0.91);
          forward.applyQuaternion(leftHand.object3D.quaternion);
          teleportPos = handPos.clone().add(forward);
          teleportMarker.setAttribute('position', teleportPos);
          teleportMarker.setAttribute('visible', true);
          teleporting = true;
        } else {
          teleportMarker.setAttribute('visible', false);
          teleporting = false;
        }

        // Tap while holding teleport
        if (teleporting && leftHand && leftHand.components['hand-tracking'].pinch) {
          player.object3D.position.copy(teleportPos);
          teleporting = false;
          teleportMarker.setAttribute('visible', false);
        }
      }
    });

    document.querySelector('a-scene').setAttribute('hand-interaction', '');
    updateHUD();
  </script>
</a-scene>
</body>
</html>
