<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Iron Man VR - REAL HUD</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene webxr="optionalFeatures: local-floor;" renderer="colorManagement:true">

<!-- CAMERA RIG -->
<a-entity id="rig">
  <a-entity id="camera" camera position="0 1.6 0"></a-entity>
</a-entity>

<!-- HANDS -->
<a-entity id="leftHand" hand-tracking-controls="hand: left"></a-entity>
<a-entity id="rightHand" hand-tracking-controls="hand: right"></a-entity>

<!-- LIGHTING (more realistic) -->
<a-light type="ambient" intensity="0.5"></a-light>
<a-light type="directional" position="3 5 -2" intensity="1.2"></a-light>

<!-- 🌆 SKY -->
<a-sky color="#111"></a-sky>

<!-- 🪞 MIRROR -->
<a-plane position="0 1.6 -3" width="2" height="2"
material="color:#888; metalness:1; roughness:0.1;"></a-plane>

<!-- 🎯 TARGET -->
<a-sphere id="target" radius="0.2" color="#ff3333"></a-sphere>

<!-- ⚡ ARC REACTOR -->
<a-sphere id="reactor" radius="0.09" color="#00ccff" position="0 1.2 -2"
material="emissive:#00ccff; emissiveIntensity:2;"></a-sphere>

<!-- 🤖 ARMOR (more realistic metal look) -->
<a-entity id="helmet" geometry="primitive:sphere;radius:0.23"
material="color:#aa0000; metalness:0.8; roughness:0.2;"></a-entity>

<a-entity id="chest" geometry="primitive:box;width:0.45;height:0.5;depth:0.25"
material="color:#aa0000; metalness:0.8;"></a-entity>

<a-entity id="waist" geometry="primitive:box;width:0.4;height:0.25;depth:0.2"
material="color:#aa0000; metalness:0.8;"></a-entity>

<a-entity id="leftArmArmor" geometry="primitive:cylinder;radius:0.09;height:0.55"
material="color:#aa0000; metalness:0.8;"></a-entity>

<a-entity id="rightArmArmor" geometry="primitive:cylinder;radius:0.09;height:0.55"
material="color:#aa0000; metalness:0.8;"></a-entity>

<a-entity id="leftLeg" geometry="primitive:cylinder;radius:0.1;height:0.65"
material="color:#aa0000; metalness:0.8;"></a-entity>

<a-entity id="rightLeg" geometry="primitive:cylinder;radius:0.1;height:0.65"
material="color:#aa0000; metalness:0.8;"></a-entity>

<a-entity id="leftFoot" geometry="primitive:box;width:0.22;height:0.1;depth:0.32"
material="color:#aa0000; metalness:0.8;"></a-entity>

<a-entity id="rightFoot" geometry="primitive:box;width:0.22;height:0.1;depth:0.32"
material="color:#aa0000; metalness:0.8;"></a-entity>

<!-- 🧠 HUD -->
<a-entity id="hud" visible="false">
  <!-- visor tint -->
  <a-plane position="0 0 -0.6" width="1.2" height="0.8"
  material="color:#00ffff; opacity:0.08"></a-plane>

  <!-- crosshair -->
  <a-ring position="0 0 -0.7" radius-inner="0.01" radius-outer="0.02"
  color="#00ffff"></a-ring>

  <!-- text -->
  <a-text id="hudText" value="SYSTEM ONLINE"
  position="-0.4 0.3 -0.7" color="#00ffff" width="1.5"></a-text>
</a-entity>

</a-scene>

<script>
// STATE
let ingots=0;
let nanoUnlocked=false;
let helmetOn=false;
let suitEjected=false;

let cam=document.querySelector("#camera");
let rig=document.querySelector("#rig");
let hud=document.querySelector("#hud");
let hudText=document.querySelector("#hudText");

// JARVIS
async function askJarvis(text){
  try{
    let res=await fetch("https://virtual-mind-companion--romalucian.replit.app/",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    let type=res.headers.get("content-type");

    if(type.includes("json")){
      let data=await res.json();
      if(data.audio) new Audio(data.audio).play();
      else speak(data.response);
    }else{
      let blob=await res.blob();
      new Audio(URL.createObjectURL(blob)).play();
    }

  }catch{
    speak("Connection failed");
  }
}

// VOICE
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=new SR();
rec.continuous=true;

rec.onresult=(e)=>{
  let t=e.results[e.results.length-1][0].transcript.toLowerCase();

  if(t.includes("jarvis open mask")) return openMask();
  if(t.includes("jarvis close mask")) return closeMask();
  if(t.includes("jarvis eject")) return ejectSuit();

  if(!helmetOn||!t.includes("jarvis")) return;

  askJarvis(t.replace("jarvis",""));
};
rec.start();

function speak(t){
  if(!helmetOn) return;
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

// HELPERS
function d(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);}

// TARGET
let target=document.querySelector("#target");
function respawn(){
  let p=cam.object3D.position;
  target.setAttribute("position",{x:p.x+(Math.random()-0.5)*3,y:p.y+Math.random()*2,z:p.z-2});
}

// ARMOR ATTACH
function attach(id,o){
  let p=document.querySelector(id);
  let c=cam.object3D.position;
  p.object3D.position.set(c.x+o.x,c.y+o.y,c.z+o.z);
}

// MASK
function openMask(){helmetOn=false; hud.setAttribute("visible",false);}
function closeMask(){helmetOn=true; hud.setAttribute("visible",true);}

// EJECT
function ejectSuit(){
  suitEjected=true;
}

// LOOP
function loop(){

  let camPos=cam.object3D.position;

  // TARGET HIT
  if(d(camPos,target.object3D.position)<0.4){
    ingots+=0.25;
    if(ingots>=60) nanoUnlocked=true;
    respawn();
    hudText.setAttribute("value","INGOTS: "+ingots.toFixed(2));
  }

  // ATTACH ARMOR
  if(nanoUnlocked&&!suitEjected){
    attach("#helmet",{x:0,y:0,z:-0.1});
    attach("#chest",{x:0,y:-0.4,z:-0.1});
    attach("#waist",{x:0,y:-0.75,z:-0.1});
    attach("#leftArmArmor",{x:-0.4,y:-0.2,z:-0.1});
    attach("#rightArmArmor",{x:0.4,y:-0.2,z:-0.1});
    attach("#leftLeg",{x:-0.2,y:-1.2,z:-0.1});
    attach("#rightLeg",{x:0.2,y:-1.2,z:-0.1});
    attach("#leftFoot",{x:-0.2,y:-1.6,z:0});
    attach("#rightFoot",{x:0.2,y:-1.6,z:0});
  }

  // FLY
  if(leftHand.object3D && rightHand.object3D){
    if(leftHand.object3D.position.y>camPos.y+0.5 &&
       rightHand.object3D.position.y>camPos.y+0.5){
      rig.object3D.position.y+=0.05;

      // THRUSTERS
      let flame=document.createElement("a-sphere");
      flame.setAttribute("radius",0.05);
      flame.setAttribute("color","#00ccff");
      flame.setAttribute("position",camPos);
      document.querySelector("a-scene").appendChild(flame);
      setTimeout(()=>flame.remove(),200);
    }
  }

  requestAnimationFrame(loop);
}

respawn();
loop();
</script>

</body>
</html>
