<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Iron Man VR - HAND TRACKING ONLY</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

<!-- CAMERA -->
<a-entity id="rig">
  <a-entity id="camera" camera position="0 1.6 0">

    <!-- HUD -->
    <a-entity id="hud" visible="false">
      <a-ring position="0 0 -0.7" radius-inner="0.01" radius-outer="0.02" color="#00ffff"></a-ring>
      <a-text id="hudText" value="BOOTING..." position="-0.4 0.3 -0.7" color="#00ffff"></a-text>
    </a-entity>

  </a-entity>
</a-entity>

<!-- HANDS -->
<a-entity id="leftHand" hand-tracking-controls="hand: left"></a-entity>
<a-entity id="rightHand" hand-tracking-controls="hand: right"></a-entity>

<!-- LIGHT -->
<a-light type="ambient" intensity="0.6"></a-light>

<!-- FLOOR -->
<a-plane rotation="-90 0 0" width="20" height="20" color="#222"></a-plane>

<!-- TARGET -->
<a-entity id="target">
  <a-cylinder radius="0.25" height="0.05" color="white"></a-cylinder>
  <a-cylinder radius="0.18" height="0.06" color="red"></a-cylinder>
  <a-cylinder radius="0.1" height="0.07" color="white"></a-cylinder>
</a-entity>

<!-- ARMOR (hidden at start) -->
<a-sphere id="helmet" visible="false" radius="0.23" color="red"></a-sphere>
<a-box id="chest" visible="false" width="0.45" height="0.5" depth="0.25" color="red"></a-box>

<!-- DEBUG MENU -->
<a-plane id="menu" visible="false" position="0 1.6 -1" width="1.2" height="0.8" color="black" opacity="0.8"></a-plane>

</a-scene>

<script>

// BASICS
let cam = document.querySelector("#camera");
let rig = document.querySelector("#rig");
let leftHand = document.querySelector("#leftHand");
let rightHand = document.querySelector("#rightHand");
let hud = document.querySelector("#hud");
let hudText = document.querySelector("#hudText");

let ingots = 0;
let nanoUnlocked = false;
let menuOpen = false;

// DISTANCE
function d(a,b){
  return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);
}

// TARGET
let target = document.querySelector("#target");
function spawnTarget(){
  let p = cam.object3D.position;
  target.object3D.position.set(
    p.x + (Math.random()-0.5)*3,
    p.y + Math.random()*1.5,
    p.z - 2
  );
}
spawnTarget();

// TELEPORT (pinch forward)
function teleport(){
  let dir = new THREE.Vector3();
  cam.object3D.getWorldDirection(dir);

  rig.object3D.position.x += dir.x * 1;
  rig.object3D.position.z += dir.z * 1;
}

// LOOP
function loop(){

  let camPos = cam.object3D.position;

  let left = leftHand.object3D.position;
  let right = rightHand.object3D.position;

  // 🎯 HIT TARGET WITH HAND
  if(d(right, target.object3D.position) < 0.3){
    ingots += 0.25;
    hudText.setAttribute("value","INGOTS: "+ingots.toFixed(2));
    spawnTarget();
  }

  // 🕊️ FLY (both hands up)
  if(left.y > camPos.y+0.5 && right.y > camPos.y+0.5){
    rig.object3D.position.y += 0.05;
  }

  // 🌀 TELEPORT (right hand forward)
  if(right.z < camPos.z - 0.5){
    teleport();
  }

  // ⚙️ MENU (left hand near face)
  if(d(left, camPos) < 0.3){
    menuOpen = !menuOpen;
    document.querySelector("#menu").setAttribute("visible", menuOpen);
  }

  // 🦾 UNLOCK SUIT
  if(ingots >= 60 && !nanoUnlocked){
    nanoUnlocked = true;
    hud.setAttribute("visible", true);

    document.querySelector("#helmet").setAttribute("visible", true);
    document.querySelector("#chest").setAttribute("visible", true);
  }

  // 🦾 ATTACH
  if(nanoUnlocked){
    document.querySelector("#helmet").object3D.position.set(camPos.x, camPos.y, camPos.z-0.1);
    document.querySelector("#chest").object3D.position.set(camPos.x, camPos.y-0.4, camPos.z-0.1);
  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
