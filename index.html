```html <!doctype html> <html lang="en"> <head> <meta charset="utf-8" /> <meta name="viewport" content="width=device-width,initial-scale=1" /> <title>LUCIAN // Step 1 (Teleport + Ingots + Bench + Mannequin)</title> <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script> <style> html,body{margin:0;height:100%;background:#05070b} #hint{ position:fixed;left:12px;bottom:12px;z-index:10; font:13px system-ui,Segoe UI,Roboto,Arial; color:rgba(210,245,255,.92); background:rgba(6,17,27,.45); border:1px solid rgba(86,230,255,.25); padding:8px 10px;border-radius:10px;max-width:460px; backdrop-filter: blur(6px); } #hint b{color:#9ff3ff} </style> </head> <body> <div id="hint"> <b>LUCIAN</b> STEP 1 — Right-hand teleport (short range), ingot drops, crafting bench + mannequin sockets.<br> Enable Hand Tracking, then Enter VR. Touch targets to score/earn ingots. </div> <script> const COSTS = { visor: 2, forearmL: 3, forearmR: 3, shoulderL: 3, shoulderR: 3, helmet: 4, thighL: 4, thighR: 4, chest: 5, back: 5 }; const NAMES = { visor: "VISOR", forearmL: "FOREARM L", forearmR: "FOREARM R", shoulderL: "SHOULDER L", shoulderR: "SHOULDER R", helmet: "HELMET", thighL: "THIGH L", thighR: "THIGH R", chest: "CHEST", back: "BACK" }; // ---------- Core game state ---------- AFRAME.registerSystem("lucian", { init() { this.ingots = 0; this.score = 0; this.timeLeft = 60; this.active = false; this.hudScore = null; this.hudTime = null; this.hudIngots = null; this.hudStatus = null; this.spawnRoot = null; this.bench = null; this.crafted = {}; // pieceId -> true }, setHUD(refs){ this.hudScore = refs.score; this.hudTime = refs.time; this.hudIngots = refs.ingots; this.hudStatus = refs.status; this.updateHUD(); }, setWorld(refs){ this.spawnRoot = refs.spawnRoot; this.bench = refs.bench; }, startSession(){ if (this.active) return; this.active = true; this.score = 0; this.ingots = 0; this.timeLeft = 60; this.crafted = {}; this.updateHUD(); this.flash("SESSION ACTIVE"); }, flash(msg){ if (!this.hudStatus) return; this.hudStatus.setAttribute("value", msg); setTimeout(() => this.hudStatus.setAttribute("value",""), 1100); }, updateHUD(){ if (this.hudScore) this.hudScore.setAttribute("value", `SCORE ${this.score}`); if (this.hudTime) this.hudTime.setAttribute("value", `TIME ${this.timeLeft}s`); if (this.hudIngots)this.hudIngots.setAttribute("value",`INGOTS ${this.ingots}`); }, addIngot(n=1){ this.ingots += n; this.updateHUD(); }, addScore(n=10){ this.score += n; this.updateHUD(); }, canAfford(pieceId){ const cost = COSTS[pieceId] ?? 999; return this.ingots >= cost; }, spendFor(pieceId){ const cost = COSTS[pieceId] ?? 999; if (this.ingots < cost) return false; this.ingots -= cost; this.updateHUD(); return true; }, markCrafted(pieceId){ this.crafted[pieceId] = true; }, isCrafted(pieceId){ return !!this.crafted[pieceId]; } }); // ---------- Targets ---------- AFRAME.registerComponent("lucian-targets", { init() { this.sys = this.el.sceneEl.systems.lucian; this.root = document.querySelector("#spawnRoot"); this.spawnBatch(7); // session timer this.sys.el = this.el; this.el.sceneEl.addEventListener("enter-vr", () => this.sys.startSession()); this.timer = setInterval(() => { if (!this.sys.active) return; this.sys.timeLeft--; if (this.sys.timeLeft <= 0){ this.sys.timeLeft = 0; this.sys.active = false; this.sys.updateHUD(); this.clear(); this.sys.flash("SESSION COMPLETE"); return; } if (this.root.children.length < 7) this.spawnBatch(2); this.sys.updateHUD(); }, 1000); }, remove(){ clearInterval(this.timer); }, clear(){ while(this.root.firstChild) this.root.removeChild(this.root.firstChild); }, spawnBatch(n){ for(let i=0;i<n;i++) this.spawn(); }, spawn(){ const t = document.createElement("a-entity"); t.classList.add("target"); const r = 0.7 + Math.random()*1.1; const ang = Math.random()*Math.PI*2; const x = Math.cos(ang)*r; const z = Math.sin(ang)*r - 0.85; const y = 1.05 + Math.random()*1.0; t.setAttribute("position", `${x} ${y} ${z}`); // visuals const ring = document.createElement("a-ring"); ring.setAttribute("radius-inner","0.055"); ring.setAttribute("radius-outer","0.065"); ring.setAttribute("material","shader:flat; color:#56e6ff; opacity:0.78; transparent:true"); t.appendChild(ring); const core = document.createElement("a-circle"); core.setAttribute("radius","0.038"); core.setAttribute("material","shader:flat; color:#ffb454; opacity:0.62; transparent:true"); core.setAttribute("position","0 0 0.002"); t.appendChild(core); const glow = document.createElement("a-circle"); glow.setAttribute("radius","0.095"); glow.setAttribute("material","shader:flat; color:#56e6ff; opacity:0.10; transparent:true"); glow.setAttribute("position","0 0 0.001"); t.appendChild(glow); t.setAttribute("animation__spin","property: rotation; to: 0 0 360; loop:true; dur: 1550; easing: linear"); t.setAttribute("animation__bob","property: position; dir: alternate; dur: 900; loop:true; easing: easeInOutSine; to: "+`${x} ${y+0.05} ${z}`); // TTL const ttl = 3200 + Math.random()*2400; setTimeout(() => { if (t.parentElement) t.parentElement.removeChild(t); }, ttl); this.root.appendChild(t); } }); // ---------- Hands: gauntlet overlay + touch to pop targets ---------- AFRAME.registerComponent("palm-pop", { schema: { hand: {default: "left"} }, init() { this.sys = this.el.sceneEl.systems.lucian; this.tmp = new THREE.Vector3(); this.tmpT = new THREE.Vector3(); // Repulsor + gauntlet const glow = document.createElement("a-circle"); glow.setAttribute("radius","0.03"); glow.setAttribute("position","0 0 0.02"); glow.setAttribute("material","shader:flat; color:#56e6ff; opacity:0.85; transparent:true"); this.el.appendChild(glow); const ring = document.createElement("a-ring"); ring.setAttribute("radius-inner","0.033"); ring.setAttribute("radius-outer","0.040"); ring.setAttribute("position","0 0 0.021"); ring.setAttribute("material","shader:flat; color:#ffb454; opacity:0.75; transparent:true"); this.el.appendChild(ring); const plate = document.createElement("a-box"); plate.setAttribute("width","0.085"); plate.setAttribute("height","0.014"); plate.setAttribute("depth","0.11"); plate.setAttribute("position","0 0.02 -0.02"); plate.setAttribute("material","color:#7a0d16; metalness:0.35; roughness:0.55"); this.el.appendChild(plate); const cuff = document.createElement("a-cylinder"); cuff.setAttribute("radius", "0.045"); cuff.setAttribute("height", "0.11"); cuff.setAttribute("position", "0 0.03 -0.09"); cuff.setAttribute("rotation", "90 0 0"); cuff.setAttribute("material", "color:#7a0d16; metalness:0.35; roughness:0.6"); this.el.appendChild(cuff); const cuffAccent = document.createElement("a-cylinder"); cuffAccent.setAttribute("radius", "0.047"); cuffAccent.setAttribute("height", "0.012"); cuffAccent.setAttribute("position", "0 0.03 -0.13"); cuffAccent.setAttribute("rotation", "90 0 0"); cuffAccent.setAttribute("material", "shader:flat; color:#ffb454; opacity:0.75; transparent:true"); this.el.appendChild(cuffAccent); }, tick() { if (!this.sys.active) return; this.el.object3D.getWorldPosition(this.tmp); const targets = document.querySelectorAll(".target"); for (const t of targets){ t.object3D.getWorldPosition(this.tmpT); if (this.tmpT.distanceTo(this.tmp) < 0.12){ // Pop this.sys.addScore(10); this.sys.addIngot(1); t.setAttribute("animation__pop","property: scale; to: 1.35 1.35 1.35; dur: 110; easing: easeOutQuad"); setTimeout(() => { if (t.parentElement) t.parentElement.removeChild(t); }, 120); break; } } } }); // ---------- Teleport (right hand) ---------- // Simple ray-based teleport: point right hand at floor disc, pinch to teleport. // Uses hand-tracking select events when available. Fallback: "pinch detector" is not implemented in Step 1. AFRAME.registerComponent("lucian-teleport", { schema: { maxDist: {default: 3.0} }, // short range init() { this.rig = document.querySelector("#rig"); this.marker = document.querySelector("#teleMarker"); this.hand = document.querySelector("#rightHand"); this.tmpO = new THREE.Vector3(); this.tmpD = new THREE.Vector3(); this.ray = new THREE.Ray(); this.floorY = 0; this.lastHit = null; // Listen for WebXR select (pinch) events from the hand this.el.sceneEl.addEventListener("select", (e) => { // Only teleport if we have a valid marker hit if (!this.lastHit) return; this.rig.object3D.position.set(this.lastHit.x, this.rig.object3D.position.y, this.lastHit.z); }); }, tick() { // cast ray from right hand forward const obj = this.hand.object3D; obj.getWorldPosition(this.tmpO); obj.getWorldDirection(this.tmpD); this.tmpD.normalize(); this.ray.origin.copy(this.tmpO); this.ray.direction.copy(this.tmpD); // intersect with floor plane y = 0 const denom = this.ray.direction.y; if (Math.abs(denom) < 1e-3){ this.marker.setAttribute("visible","false"); this.lastHit = null; return; } const t = (this.floorY - this.ray.origin.y) / denom; if (t < 0 || t > this.data.maxDist){ this.marker.setAttribute("visible","false"); this.lastHit = null; return; } const hit = this.ray.at(t, new THREE.Vector3()); this.marker.object3D.position.copy(hit); this.marker.setAttribute("visible","true"); this.lastHit = hit; } }); // ---------- Bench: spawn blanks + snap to mannequin sockets ---------- AFRAME.registerComponent("bench-controller", { init() { this.sys = this.el.sceneEl.systems.lucian; this.spawnArea = document.querySelector("#spawnArea"); this.sockets = [...document.querySelectorAll("[snap-socket]")]; } }); AFRAME.registerComponent("spawn-button", { schema: { piece: {default: "visor"} }, init() { this.sys = this.el.sceneEl.systems.lucian; this.spawnArea = document.querySelector("#spawnArea"); this.el.addEventListener("click", () => this.spawn()); }, spawn() { const pieceId = this.data.piece; if (this.sys.isCrafted(pieceId)) { this.sys.flash(`${NAMES[pieceId]} ALREADY MADE`); return; } if (!this.sys.canAfford(pieceId)) { this.sys.flash(`NEED ${COSTS[pieceId]} INGOTS`); return; } if (!this.sys.spendFor(pieceId)) return; const p = document.createElement("a-entity"); p.classList.add("armor-piece"); p.setAttribute("piece-id", pieceId); // simple holo blank geometry per type const g = document.createElement("a-entity"); const mat = "shader: flat; color:#56e6ff; opacity:0.55; transparent:true"; const mat2 = "shader: flat; color:#ffb454; opacity:0.40; transparent:true"; if (pieceId === "visor"){ const a = document.createElement("a-torus"); a.setAttribute("radius","0.07"); a.setAttribute("radius-tubular","0.01"); a.setAttribute("material", mat); g.appendChild(a); } else if (pieceId === "helmet"){ const a = document.createElement("a-sphere"); a.setAttribute("radius","0.09"); a.setAttribute("material", mat); g.appendChild(a); } else if (pieceId === "chest" || pieceId === "back"){ const a = document.createElement("a-box"); a.setAttribute("width","0.22"); a.setAttribute("height","0.18"); a.setAttribute("depth","0.10"); a.setAttribute("material", mat); g.appendChild(a); } else if (pieceId.startsWith("shoulder")){ const a = document.createElement("a-sphere"); a.setAttribute("radius","0.07"); a.setAttribute("material", mat); g.appendChild(a); } else if (pieceId.startsWith("forearm")){ const a = document.createElement("a-cylinder"); a.setAttribute("radius","0.05"); a.setAttribute("height","0.16"); a.setAttribute("rotation","90 0 0"); a.setAttribute("material", mat); g.appendChild(a); } else if (pieceId.startsWith("thigh")){ const a = document.createElement("a-cylinder"); a.setAttribute("radius","0.06"); a.setAttribute("height","0.20"); a.setAttribute("rotation","90 0 0"); a.setAttribute("material", mat); g.appendChild(a); } // amber accent const accent = document.createElement("a-ring"); accent.setAttribute("radius-inner","0.035"); accent.setAttribute("radius-outer","0.045"); accent.setAttribute("position","0 0 0.06"); accent.setAttribute("material", mat2); g.appendChild(accent); p.appendChild(g); // spawn at area const wpos = new THREE.Vector3(); this.spawnArea.object3D.getWorldPosition(wpos); p.setAttribute("position", `${wpos.x} ${wpos.y} ${wpos.z}`); p.setAttribute("grabbable", ""); this.el.sceneEl.appendChild(p); this.sys.flash(`SPAWNED ${NAMES[pieceId]}`); } }); // Simple grab: pinch "selectstart" to attach to hand; release to drop. AFRAME.registerComponent("grabbable", { init() { this.leftHand = document.querySelector("#leftHand"); this.rightHand = document.querySelector("#rightHand"); this.grabbedBy = null; // We'll use global selectstart/selectend events and choose nearest hand. this._onSelectStart = (e) => { if (this.grabbedBy) return; // distance test: which hand is closer to this object? const objPos = new THREE.Vector3(); this.el.object3D.getWorldPosition(objPos); const l = new THREE.Vector3(); const r = new THREE.Vector3(); this.leftHand.object3D.getWorldPosition(l); this.rightHand.object3D.getWorldPosition(r); const dl = objPos.distanceTo(l); const dr = objPos.distanceTo(r); const hand = dl < dr ? this.leftHand : this.rightHand; const dmin = Math.min(dl, dr); if (dmin > 0.18) return; // must be near hand to grab this.grabbedBy = hand; hand.object3D.attach(this.el.object3D); this.el.setAttribute("position", "0 0 0"); // relative to hand }; this._onSelectEnd = (e) => { if (!this.grabbedBy) return; // detach to world const scene = this.el.sceneEl.object3D; scene.attach(this.el.object3D); this.grabbedBy = null; // try snap if near a matching socket const socket = this.findSocket(); if (socket) this.snapTo(socket); }; this.el.sceneEl.addEventListener("selectstart", this._onSelectStart); this.el.sceneEl.addEventListener("selectend", this._onSelectEnd); }, remove(){ this.el.sceneEl.removeEventListener("selectstart", this._onSelectStart); this.el.sceneEl.removeEventListener("selectend", this._onSelectEnd); }, findSocket(){ const pieceId = this.el.getAttribute("piece-id"); const sockets = [...document.querySelectorAll("[snap-socket]")]; const objPos = new THREE.Vector3(); this.el.object3D.getWorldPosition(objPos); let best = null; let bestD = 999; for (const s of sockets){ if (s.getAttribute("snap-socket") !== pieceId) continue; const sp = new THREE.Vector3(); s.object3D.getWorldPosition(sp); const d = objPos.distanceTo(sp); if (d < 0.20 && d < bestD){ best = s; bestD = d; } } return best; }, snapTo(socket){ const pieceId = this.el.getAttribute("piece-id"); const sys = this.el.sceneEl.systems.lucian; // attach object to socket and set local transform socket.object3D.attach(this.el.object3D); this.el.setAttribute("position","0 0 0"); this.el.setAttribute("rotation","0 0 0"); this.el.setAttribute("scale","1 1 1"); sys.markCrafted(pieceId); sys.flash(`${NAMES[pieceId]} ATTACHED`); this.el.classList.add("snapped"); } }); // ---------- Cursor for bench buttons (hand ray) ---------- AFRAME.registerComponent("hand-ray", { schema: { hand: {default:"right"} }, init() { const line = document.createElement("a-entity"); line.setAttribute("line", "start: 0 0 0; end: 0 0 -1.5; color: #56e6ff; opacity: 0.7"); this.el.appendChild(line); // Raycaster + cursor click this.el.setAttribute("raycaster", "objects: .clickable; far: 1.6; showLine: false"); this.el.setAttribute("cursor", "rayOrigin: entity; fuse: false"); } }); </script> <a-scene background="color: #05070b" renderer="antialias: true; colorManagement: true" vr-mode-ui="enabled: true" webxr="requiredFeatures: hand-tracking, local-floor; optionalFeatures: bounded-floor" lucian-targets > <!-- Rig for teleport --> <a-entity id="rig" position="0 0 0"> <a-entity id="cam" position="0 1.6 0"> <a-camera></a-camera> </a-entity> </a-entity> <!-- Teleport marker --> <a-ring id="teleMarker" visible="false" position="0 0 0" rotation="-90 0 0" radius-inner="0.10" radius-outer="0.13" material="shader: flat; color:#56e6ff; opacity:0.65; transparent:true"></a-ring> <!-- Floor --> <a-plane rotation="-90 0 0" width="30" height="30" material="shader: flat; color:#06111b; opacity:0.25; transparent:true"></a-plane> <!-- Stars --> <a-entity id="stars"></a-entity> <!-- HUD --> <a-entity id="hud" position="0 1.55 -1.35"> <a-entity position="0 0.22 0"> <a-plane width="1.25" height="0.18" color="#06101a" opacity="0.72"></a-plane> <a-plane width="0.02" height="0.18" color="#ffb454" position="-0.615 0 0.011" opacity="0.9"></a-plane> <a-text value="LUCIAN" color="#9ff3ff" align="center" position="0 0.03 0.01" width="2.2" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text> <a-text id="hudStatus" value="" color="#ffddb1" align="center" position="0 -0.04 0.01" width="2.2" font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"></a-text> </a-entity> <a-entity position="-0.82 -0.18 0"> <a-plane width="0.78" height="0.56" color="#06111b" opacity="0.70"></a-plane> <a-text id="hudScore" value="SCORE 0" color="#9ff3ff" align="left" position="-0.35 0.20 0.02" width="1.2" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text> <a-text id="hudTime" value="TIME 60s" color="#a6f6ff" opacity="0.9" align="left" position="-0.35 0.10 0.02" width="1.2" font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"></a-text> <a-text id="hudIngots" value="INGOTS 0" color="#ffd8a6" opacity="0.95" align="left" position="-0.35 0.00 0.02" width="1.2" font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"></a-text> <a-text value="Touch targets to earn ingots.\nGo to bench to spawn pieces." color="#a6f6ff" opacity="0.85" align="left" position="-0.35 -0.14 0.02" width="1.2" font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"></a-text> </a-entity> <a-entity position="0.82 -0.18 0"> <a-plane width="0.78" height="0.56" color="#06111b" opacity="0.70"></a-plane> <a-text value="BENCH COSTS (B)" color="#ffe7c4" align="left" position="-0.35 0.20 0.02" width="1.2" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text> <a-text value="visor2 forearm3 shoulder3\nhelmet4 thigh4 chest5 back5" color="#ffd8a6" opacity="0.9" align="left" position="-0.35 0.06 0.02" width="1.25" font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"></a-text> <a-text value="Step 1: spawn + snap only.\nForging/hammer in Step 2." color="#a6f6ff" opacity="0.85" align="left" position="-0.35 -0.10 0.02" width="1.2" f
