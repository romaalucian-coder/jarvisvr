```html <!doctype html> <html lang="en"> <head> <meta charset="utf-8" /> <meta name="viewport" content="width=device-width,initial-scale=1" /> <title>LUCIAN // Offline HUD (WebXR)</title> <style> html,body{margin:0;height:100%;background:#05070b;color:#cfefff;font-family:system-ui,Segoe UI,Roboto,Arial} .hint{position:fixed;left:12px;bottom:12px;opacity:.85;font-size:13px} .hint kbd{background:#0b1320;border:1px solid #1a3550;border-bottom-color:#0a2033;padding:2px 6px;border-radius:6px} a{color:#7fe7ff} </style> </head> <body> <div class="hint"> Quest: open in Meta Quest Browser → click <kbd>ENTER VR</kbd>. Offline demo only. </div> <script type="module"> import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js"; import { VRButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/VRButton.js"; const scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x05070b, 0.08); const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 100); camera.position.set(0, 1.6, 1.2); const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true }); renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(devicePixelRatio); renderer.xr.enabled = true; renderer.outputColorSpace = THREE.SRGBColorSpace; document.body.appendChild(renderer.domElement); document.body.appendChild(VRButton.createButton(renderer)); // Lighting scene.add(new THREE.AmbientLight(0x6bb6c9, 0.25)); const key = new THREE.DirectionalLight(0x9fefff, 0.65); key.position.set(2, 3, 1); scene.add(key); // Subtle starfield const starsGeo = new THREE.BufferGeometry(); const starCount = 2000; const pos = new Float32Array(starCount*3); for (let i=0;i<starCount;i++){ const r = 18*Math.random()+2; const t = Math.random()*Math.PI*2; const p = (Math.random()-0.5)*Math.PI; pos[i*3+0] = Math.cos(t)*Math.cos(p)*r; pos[i*3+1] = Math.sin(p)*r*0.6 + 1.0; pos[i*3+2] = Math.sin(t)*Math.cos(p)*r; } starsGeo.setAttribute("position", new THREE.BufferAttribute(pos,3)); const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0x2aa6c9,size:0.02,transparent:true,opacity:0.55})); scene.add(stars); // HUD group anchored in front of user const hud = new THREE.Group(); hud.position.set(0, 1.55, -1.35); scene.add(hud); // Helpers: crisp line material (cyan) + amber accents const CYAN = 0x56e6ff; const AMBER = 0xffb454; function makePanel(w,h,opts={}){ const g = new THREE.PlaneGeometry(w,h); const m = new THREE.MeshBasicMaterial({ color: opts.tint ?? 0x071421, transparent:true, opacity: opts.opacity ?? 0.75, side:THREE.DoubleSide }); const p = new THREE.Mesh(g,m); p.renderOrder = 1; return p; } function makeFrame(w,h,color=CYAN){ // simple rectangular frame using line segments const hw=w/2, hh=h/2; const pts = [ -hw,-hh,0, hw,-hh,0, hw,-hh,0, hw, hh,0, hw, hh,0, -hw, hh,0, -hw, hh,0, -hw,-hh,0 ]; const geo = new THREE.BufferGeometry(); geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(pts), 3)); const mat = new THREE.LineBasicMaterial({color, transparent:true, opacity:0.95}); const line = new THREE.LineSegments(geo, mat); line.renderOrder = 3; return line; } function makeRing(r, thickness, color, opacity=0.9){ const g = new THREE.RingGeometry(r - thickness, r, 64); const m = new THREE.MeshBasicMaterial({color, transparent:true, opacity, side:THREE.DoubleSide}); const ring = new THREE.Mesh(g,m); ring.renderOrder = 2; return ring; } // Title plate const title = new THREE.Group(); title.position.set(0, 0.22, 0); const titlePanel = makePanel(1.25, 0.18, {tint:0x06101a, opacity:0.72}); title.add(titlePanel); title.add(makeFrame(1.25,0.18,CYAN)); // Canvas texture for text function textTexture(lines, {w=1024,h=256, fg="#9ff3ff", accent="#ffb454"} = {}){ const c = document.createElement("canvas"); c.width=w; c.height=h; const ctx=c.getContext("2d"); ctx.clearRect(0,0,w,h); // scanline for(let y=0;y<h;y+=4){ ctx.fillStyle = `rgba(120, 230, 255, ${y%8===0?0.06:0.02})`; ctx.fillRect(0,y,w,1); } ctx.font="600 64px system-ui, Segoe UI, Arial"; ctx.fillStyle=fg; ctx.textBaseline="middle"; ctx.fillText(lines[0] ?? "", 44, 82); ctx.font="500 34px system-ui, Segoe UI, Arial"; ctx.fillStyle="rgba(160,245,255,0.9)"; ctx.fillText(lines[1] ?? "", 46, 155); // amber accent bar ctx.fillStyle=accent; ctx.globalAlpha=0.85; ctx.fillRect(0, 0, 10, h); ctx.globalAlpha=1; const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex; } const titleTex = textTexture(["LUCIAN", "OFFLINE VR INTERFACE // WEBXR"]); const titleText = new THREE.Mesh( new THREE.PlaneGeometry(1.22,0.16), new THREE.MeshBasicMaterial({map:titleTex,transparent:true,opacity:0.95,side:THREE.DoubleSide}) ); titleText.position.set(0,0,0.002); titleText.renderOrder = 4; title.add(titleText); hud.add(title); // Central rings + reticle const core = new THREE.Group(); core.position.set(0, -0.02, 0.02); const ring1 = makeRing(0.26, 0.012, CYAN, 0.55); const ring2 = makeRing(0.19, 0.010, AMBER, 0.55); const ring3 = makeRing(0.12, 0.008, CYAN, 0.75); ring2.rotation.z = Math.PI/8; core.add(ring1, ring2, ring3); const ret = makeFrame(0.08,0.08,AMBER); ret.position.z = 0.003; core.add(ret); hud.add(core); // Left transcript panel (offline) const left = new THREE.Group(); left.position.set(-0.82, -0.18, 0); const leftPanel = makePanel(0.78, 0.56, {tint:0x06111b, opacity:0.70}); left.add(leftPanel); left.add(makeFrame(0.78,0.56,CYAN)); const leftTex = textTexture( ["VOICE // OFFLINE", "Press TALK. If browser speech fails, type."], {w:1024,h:512} ); const leftText = new THREE.Mesh( new THREE.PlaneGeometry(0.76,0.54), new THREE.MeshBasicMaterial({map:leftTex,transparent:true,opacity:0.95,side:THREE.DoubleSide}) ); leftText.position.z = 0.002; left.add(leftText); hud.add(left); // Right system panel (pairing placeholder) const right = new THREE.Group(); right.position.set(0.82, -0.18, 0); const rightPanel = makePanel(0.78, 0.56, {tint:0x06111b, opacity:0.70}); right.add(rightPanel); right.add(makeFrame(0.78,0.56,AMBER)); const rightTex = textTexture( ["PAIR // GO ONLINE", "Later: open PC-hosted link to enable live chat."], {w:1024,h:512, fg:"#ffe7c4", accent:"#56e6ff"} ); const rightText = new THREE.Mesh( new THREE.PlaneGeometry(0.76,0.54), new THREE.MeshBasicMaterial({map:rightTex,transparent:true,opacity:0.95,side:THREE.DoubleSide}) ); rightText.position.z = 0.002; right.add(rightText); hud.add(right); // Simple “TALK” button (visual only; speech API is flaky on Quest) const talk = new THREE.Group(); talk.position.set(0, -0.52, 0.03); const talkPanel = makePanel(0.55, 0.14, {tint:0x071421, opacity:0.78}); talk.add(talkPanel); talk.add(makeFrame(0.55,0.14,CYAN)); const talkTex = textTexture(["TALK (OFFLINE)", "Speech API may not work on Quest"], {w:1024,h:256}); const talkText = new THREE.Mesh( new THREE.PlaneGeometry(0.53, 0.12), new THREE.MeshBasicMaterial({map:talkTex,transparent:true,opacity:0.95,side:THREE.DoubleSide}) ); talkText.position.z = 0.002; talk.add(talkText); hud.add(talk); // Animate: slow ring rotation + subtle HUD bob const clock = new THREE.Clock(); renderer.setAnimationLoop(() => { const t = clock.getElapsedTime(); ring1.rotation.z = t*0.25; ring2.rotation.z = -t*0.33 + Math.PI/8; ring3.rotation.z = t*0.45; hud.position.y = 1.55 + Math.sin(t*0.6)*0.01; stars.rotation.y = t*0.02; renderer.render(scene, camera); }); addEventListener("resize", () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); }); // Optional: attempt Web Speech API if it exists (often doesn't on Quest) // This is a visual offline demo; when you want the live version we’ll do // mic capture + PC relay + proper transcription. </script> </body> </html> ``` If you tell me your PC IP, I’ll also give you the exact one-liner to host it and the Quest URL to open.
