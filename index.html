html <!doctype html> <html lang="en"> <head> <meta charset="utf-8" /> <meta name="viewport" content="width=device-width,initial-scale=1" /> <title>LUCIAN // Step 1 (Teleport + Ingots + Bench + Mannequin)</title> <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script> <style> html,body{margin:0;height:100%;background:#05070b} #hint{ position:fixed;left:12px;bottom:12px;z-index:10; font:13px system-ui,Segoe UI,Roboto,Arial; color:rgba(210,245,255,.92); background:rgba(6,17,27,.45); border:1px solid rgba(86,230,255,.25); padding:8px 10px;border-radius:10px;max-width:480px; backdrop-filter: blur(6px); } #hint b{color:#9ff3ff} </style> </head> <body> <div id="hint"> <b>LUCIAN</b> STEP 1 — right-hand teleport (short range), targets drop ingots, bench spawns pieces, snap to mannequin sockets. </div> <script> const COSTS = { visor: 2, forearmL: 3, forearmR: 3, shoulderL: 3, shoulderR: 3, helmet: 4, thighL: 4, thighR: 4, chest: 5, back: 5 }; const NAMES = { visor: "VISOR", forearmL: "FOREARM L", forearmR: "FOREARM R", shoulderL: "SHOULDER L", shoulderR: "SHOULDER R", helmet: "HELMET", thighL: "THIGH L", thighR: "THIGH R", chest: "CHEST", back: "BACK" }; // ---------- Global state system ---------- AFRAME.registerSystem("lucian", { init() { this.active = false; this.score = 0; this.ingots = 0; this.timeLeft = 60; this.crafted = {}; // pieceId -> true this.hud = { score:null, time:null, ingots:null, status:null }; }, setHUD(scoreEl, timeEl, ingotsEl, statusEl){ this.hud.score = scoreEl; this.hud.time = timeEl; this.hud.ingots = ingotsEl; this.hud.status = statusEl; this.updateHUD(); }, startSession(){ if (this.active) return; this.active = true; this.score = 0; this.ingots = 0; this.timeLeft = 60; this.crafted = {}; this.updateHUD(); this.flash("SESSION ACTIVE"); }, flash(msg){ if (!this.hud.status) return; this.hud.status.setAttribute("value", msg); setTimeout(()=> this.hud.status && this.hud.status.setAttribute("value",""), 1100); }, updateHUD(){ this.hud.score && this.hud.score.setAttribute("value", `SCORE ${this.score}`); this.hud.time && this.hud.time.setAttribute("value", `TIME ${this.timeLeft}s`); this.hud.ingots&& this.hud.ingots.setAttribute("value",`INGOTS ${this.ingots}`); }, addScore(n){ this.score += n; this.updateHUD(); }, addIngots(n){ this.ingots += n; this.updateHUD(); }, canAfford(pieceId){ return this.ingots >= (COSTS[pieceId] ?? 999); }, spend(pieceId){ const cost = COSTS[pieceId] ?? 999; if (this.ingots < cost) return false; this.ingots -= cost; this.updateHUD(); return true; }, markCrafted(pieceId){ this.crafted[pieceId] = true; }, isCrafted(pieceId){ return !!this.crafted[pieceId]; } }); // ---------- Targets spawner + session timer ---------- AFRAME.registerComponent("lucian-session", { init() { this.sys = this.el.sceneEl.systems.lucian; this.root = document.querySelector("#spawnRoot"); this.el.sceneEl.addEventListener("enter-vr", () => this.sys.startSession()); this.spawnBatch(7); this.timer = setInterval(() => { if (!this.sys.active) return; this.sys.timeLeft--; if (this.sys.timeLeft <= 0){ this.sys.timeLeft = 0; this.sys.active = false; this.sys.updateHUD(); this.clearTargets(); this.sys.flash("SESSION COMPLETE"); return; } if (this.root.children.length < 7) this.spawnBatch(2); this.sys.updateHUD(); }, 1000); }, remove(){ clearInterval(this.timer); }, clearTargets(){ while(this.root.firstChild) this.root.removeChild(this.root.firstChild); }, spawnBatch(n){ for(let i=0;i<n;i++) this.spawnTarget(); }, spawnTarget(){ const t = document.createElement("a-entity"); t.classList.add("target"); const r = 0.7 + Math.random()*1.1; const ang = Math.random()*Math.PI*2; const x = Math.cos(ang)*r; const z = Math.sin(ang)*r - 0.85; const y = 1.05 + Math.random()*1.0; t.setAttribute("position", `${x} ${y} ${z}`); const ring = document.createElement("a-ring"); ring.setAttribute("radius-inner","0.055"); ring.setAttribute("radius-outer","0.065"); ring.setAttribute("material","shader:flat; color:#56e6ff; opacity:0.78; transparent:true"); t.appendChild(ring); const core = document.createElement("a-circle"); core.setAttribute("radius","0.038"); core.setAttribute("material","shader:flat; color:#ffb454; opacity:0.62; transparent:true"); core.setAttribute("position","0 0 0.002"); t.appendChild(core); const glow = document.createElement("a-circle"); glow.setAttribute("radius","0.095"); glow.setAttribute("material","shader:flat; color:#56e6ff; opacity:0.10; transparent:true"); glow.setAttribute("position","0 0 0.001"); t.appendChild(glow); t.setAttribute("animation__spin","property: rotation; to: 0 0 360; loop:true; dur: 1550; easing: linear"); t.setAttribute("animation__bob","property: position; dir: alternate; dur: 900; loop:true; easing: easeInOutSine; to: "+`${x} ${y+0.05} ${z}`); const ttl = 3200 + Math.random()*2400; setTimeout(() => { if (t.parentElement) t.parentElement.removeChild(t); }, ttl); this.root.appendChild(t); } }); // ---------- Hand visuals + "touch to pop" ---------- AFRAME.registerComponent("palm-pop", { init() { this.sys = this.el.sceneEl.systems.lucian; this.tmp = new THREE.Vector3(); this.tmpT = new THREE.Vector3(); const glow = document.createElement("a-circle"); glow.setAttribute("radius","0.03"); glow.setAttribute("position","0 0 0.02"); glow.setAttribute("material","shader:flat; color:#56e6ff; opacity:0.85; transparent:true"); this.el.appendChild(glow); const ring = document.createElement("a-ring"); ring.setAttribute("radius-inner","0.033"); ring.setAttribute("radius-outer","0.040"); ring.setAttribute("position","0 0 0.021"); ring.setAttribute("material","shader:flat; color:#ffb454; opacity:0.75; transparent:true"); this.el.appendChild(ring); const plate = document.createElement("a-box"); plate.setAttribute("width","0.085"); plate.setAttribute("height","0.014"); plate.setAttribute("depth","0.11"); plate.setAttribute("position","0 0.02 -0.02"); plate.setAttribute("material","color:#7a0d16; metalness:0.35; roughness:0.55"); this.el.appendChild(plate); const cuff = document.createElement("a-cylinder"); cuff.setAttribute("radius", "0.045"); cuff.setAttribute("height", "0.11"); cuff.setAttribute("position", "0 0.03 -0.09"); cuff.setAttribute("rotation", "90 0 0"); cuff.setAttribute("material", "color:#7a0d16; metalness:0.35; roughness:0.6"); this.el.appendChild(cuff); const cuffAccent = document.createElement("a-cylinder"); cuffAccent.setAttribute("radius", "0.047"); cuffAccent.setAttribute("height", "0.012"); cuffAccent.setAttribute("position", "0 0.03 -0.13"); cuffAccent.setAttribute("rotation", "90 0 0"); cuffAccent.setAttribute("material", "shader:flat; color:#ffb454; opacity:0.75; transparent:true"); this.el.appendChild(cuffAccent); }, tick() { if (!this.sys.active) return; this.el.object3D.getWorldPosition(this.tmp); const targets = document.querySelectorAll(".target"); for (const t of targets){ t.object3D.getWorldPosition(this.tmpT); if (this.tmpT.distanceTo(this.tmp) < 0.12){ this.sys.addScore(10); this.sys.addIngots(1); t.setAttribute("animation__pop","property: scale; to: 1.35 1.35 1.35; dur: 110; easing: easeOutQuad"); setTimeout(() => { if (t.parentElement) t.parentElement.removeChild(t); }, 120); break; } } } }); // ---------- Right-hand teleport (short range) ---------- AFRAME.registerComponent("lucian-teleport", { schema: { maxDist: {default: 3.0} }, init() { this.rig = document.querySelector("#rig"); this.hand = document.querySelector("#rightHand"); this.marker = document.querySelector("#teleMarker"); this.tmpO = new THREE.Vector3(); this.tmpD = new THREE.Vector3(); this.ray = new THREE.Ray(); this.lastHit = null; this.floorY = 0; this.el.sceneEl.addEventListener("select", () => { if (!this.lastHit) return; this.rig.object3D.position.set(this.lastHit.x, this.rig.object3D.position.y, this.lastHit.z); }); }, tick() { const obj = this.hand.object3D; obj.getWorldPosition(this.tmpO); obj.getWorldDirection(this.tmpD); this.tmpD.normalize(); this.ray.origin.copy(this.tmpO); this.ray.direction.copy(this.tmpD); const denom = this.ray.direction.y; if (Math.abs(denom) < 1e-3){ this.marker.setAttribute("visible","false"); this.lastHit = null; return; } const t = (this.floorY - this.ray.origin.y) / denom; if (t < 0 || t > this.data.maxDist){ this.marker.setAttribute("visible","false"); this.lastHit = null; return; } const hit = this.ray.at(t, new THREE.Vector3()); this.marker.object3D.position.copy(hit); this.marker.setAttribute("visible","true"); this.lastHit = hit; } }); // ---------- Bench: spawn buttons ---------- AFRAME.registerComponent("spawn-button", { schema: { piece: {default:"visor"} }, init() { this.sys = this.el.sceneEl.systems.lucian; this.spawnArea = null; this.el.sceneEl.addEventListener("loaded", () => { this.spawnArea = document.querySelector("#spawnArea"); }); this.el.addEventListener("click", () => this.spawn()); }, spawn() { const pieceId = this.data.piece; if (this.sys.isCrafted(pieceId)){ this.sys.flash(`${NAMES[pieceId]} ALREADY ATTACHED`); return; } if (!this.sys.canAfford(pieceId)){ this.sys.flash(`NEED ${COSTS[pieceId]} INGOTS`); return; } if (!this.sys.spend(pieceId)) return; const p = document.createElement("a-entity"); p.classList.add("armor-piece"); p.setAttribute("piece-id", pieceId); p.setAttribute("grabbable", ""); const matC = "shader: flat; color:#56e6ff; opacity:0.55; transparent:true"; const matA = "shader: flat; color:#ffb454; opacity:0.40; transparent:true"; if (pieceId === "visor"){ const a = document.createElement("a-torus"); a.setAttribute("radius","0.07"); a.setAttribute("radius-tubular","0.01"); a.setAttribute("material", matC); p.appendChild(a); } else if (pieceId === "helmet"){ const a = document.createElement("a-sphere"); a.setAttribute("radius","0.09"); a.setAttribute("material", matC); p.appendChild(a); } else if (pieceId === "chest" || pieceId === "back"){ const a = document.createElement("a-box"); a.setAttribute("width","0.22"); a.setAttribute("height","0.18"); a.setAttribute("depth","0.10"); a.setAttribute("material", matC); p.appendChild(a); } else if (pieceId.startsWith("shoulder")){ const a = document.createElement("a-sphere"); a.setAttribute("radius","0.07"); a.setAttribute("material", matC); p.appendChild(a); } else if (pieceId.startsWith("forearm")){ const a = document.createElement("a-cylinder"); a.setAttribute("radius","0.05"); a.setAttribute("height","0.16"); a.setAttribute("rotation","90 0 0"); a.setAttribute("material", matC); p.appendChild(a); } else if (pieceId.startsWith("thigh")){ const a = document.createElement("a-cylinder"); a.setAttribute("radius","0.06"); a.setAttribute("height","0.20"); a.setAttribute("rotation","90 0 0"); a.setAttribute("material", matC); p.appendChild(a); } const accent = document.createElement("a-ring"); accent.setAttribute("radius-inner","0.035"); accent.setAttribute("radius-outer","0.045"); accent.setAttribute("position","0 0 0.06"); accent.setAttribute("material", matA); p.appendChild(accent); const wpos = new THREE.Vector3(); this.spawnArea.object3D.getWorldPosition(wpos); p.setAttribute("position", `${wpos.x} ${wpos.y+0.08} ${wpos.z}`); this.el.sceneEl.appendChild(p); this.sys.flash(`SPAWNED ${NAMES[pieceId]}`); } }); // ---------- Grab + snap ---------- AFRAME.registerComponent("grabbable", { init() { this.leftHand = document.querySelector("#leftHand"); this.rightHand = document.querySelector("#rightHand"); this.grabbedBy = null; this._onSelectStart = () => { if (this.grabbedBy) return; const objPos = new THREE.Vector3(); this.el.object3D.getWorldPosition(objPos); const l = new THREE.Vector3(); const r = new THREE.Vector3(); this.leftHand.object3D.getWorldPosition(l); this.rightHand.object3D.getWorldPosition(r); const dl = objPos.distanceTo(l); const dr = objPos.distanceTo(r); const hand = dl < dr ? this.leftHand : this.rightHand; const dmin = Math.min(dl, dr); if (dmin > 0.20) return; this.grabbedBy = hand; hand.object3D.attach(this.el.object3D); this.el.setAttribute("position", "0 0 0"); }; this._onSelectEnd = () => { if (!this.grabbedBy) return; this.el.sceneEl.object3D.attach(this.el.object3D); this.grabbedBy = null; const socket = this.findSocket(); if (socket) this.snap(socket); }; this.el.sceneEl.addEventListener("selectstart", this._onSelectStart); this.el.sceneEl.addEventListener("selectend", this._onSelectEnd); }, remove() { this.el.sceneEl.removeEventListener("selectstart", this._onSelectStart); this.el.sceneEl.removeEventListener("selectend", this._onSelectEnd); }, findSocket() { const pieceId = this.el.getAttribute("piece-id"); const sockets = [...document.querySelectorAll("[snap-socket]")]; const objPos = new THREE.Vector3(); this.el.object3D.getWorldPosition(objPos); let best = null; let bestD = 999; for (const s of sockets){ if (s.getAttribute("snap-socket") !== pieceId) continue; const sp = new THREE.Vector3(); s.object3D.getWorldPosition(sp); const d = objPos.distanceTo(sp); if (d < 0.22 && d < bestD){ best = s; bestD = d; } } return best; }, snap(socket) { const pieceId = this.el.getAttribute("piece-id"); const sys = this.el.sceneEl.systems.lucian; socket.object3D.attach(this.el.object3D); this.el.setAttribute("position", "0 0 0"); this.el.setAttribute("rotation", "0 0 0"); this.el.setAttribute("scale", "1 1 1"); sys.markCrafted(pieceId); sys.flash(`${NAMES[pieceId]} ATTACHED`); this.el.classList.add("snapped"); } }); // ---------- Hand ray cursor for bench buttons ---------- AFRAME.registerComponent("hand-ray", { init() { const line = document.createElement("a-entity"); line.setAttribute("line", "start: 0 0 0; end: 0 0 -1.5; color: #56e6ff; opacity: 0.7"); this.el.appendChild(line); this.el.setAttribute("raycaster", "objects: .clickable; far: 1.6; showLine: false"); this.el.setAttribute("cursor", "rayOrigin: entity; fuse: false"); } }); </script> html <a-scene background="color: #05070b" renderer="antialias: true; colorManagement: true" vr-mode-ui="enabled: true" webxr="requiredFeatures: hand-tracking, local-floor; optionalFeatures: bounded-floor" lucian-session lucian-teleport > <!- .fnt"></a-text> </a-entity> <a-entity position="0.82 -0.18 0"> <a-plane width="0.78" height="0.56" color="#06111b" opacity="0.70"></a-plane> <a-text value="COSTS" color="#ffe7c4" align="left" position="-0.35 0.20 0.02" width="1.2" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text> <a-text value="visor2 forearm3 shoulder3\nhelmet4 thigh4 chest5 back5" color="#ffd8a6" opacity="0.9" align="left" position="-0.35 0.06 0.02" width="1.25" font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"></a-text> <a-text value="Step 1: spawn + snap only." color="#a6f6ff" opacity="0.85" align="left" position="-0.35 -0.10 0.02" width="1.2" font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"></a-text> </a-entity> </a-entity> <!-- Bench + mannequin --> <a-entity id="bench" position="0 0 -3.2"> <a-box position="0 0.55 0" width="1.4" height="0.10" depth="0.7" material="color:#071421; metalness:0.15; roughness:0.85" opacity="0.95"></a-box> <a-box position="0 0.25 0" width="1.3" height="0.50" depth="0.6" material="color:#06111b; metalness:0.10; roughness:0.9" opacity="0.65"></a-box> <!-- spawn area --> <a-circle id="spawnArea" radius="0.14" position="-0.45 0.61 0.05" rotation="-90 0 0" material="shader: flat; color:#56e6ff; opacity:0.25; transparent:true"></a-circle> <a-ring radius-inner="0.14" radius-outer="0.16" position="-0.45 0.611 0.05" rotation="-90 0 0" material="shader: flat; color:#ffb454; opacity:0.45; transparent:true"></a-ring> <!-- button panel --> <a-plane position="0.45 0.70 0.00" rotation="-60 0 0" width="0.90" height="0.62" material="shader: flat; color:#06101a; opacity:0.85"></a-plane> <!-- buttons --> <a-entity position="0.14 0.76 0.18"> <a-entity class="clickable" geometry="primitive: plane; width: 0.26; height: 0.08" material="shader: flat; color:#56e6ff; opacity:0.35; transparent:true" spawn-button="piece: visor"></a-entity> <a-text value="VISOR (2)" position="-0.12 -0.02 0.01" width="1.0" color="#9ff3ff" font="https://cdn.aframe.io/fonts/Exo2SemiBold.fnt"></a-text> e scene is loaded const scene = document.querySelector("a-scene"); scene.addEventListener("loaded", () => { const sys = scene.systems.lucian; sys.setHUD( document.querySelector("#hudScore"), document.querySelector("#hudTime"), document.querySelector("#hudIngots"), document.querySelector("#hudStatus") ); // Stars const stars = document.querySelector("#stars"); for (let i=0;i<900;i++){ const s = document.createElement("a-sphere"); const r = 10 + Math.random()*12; const t = Math.random()*Math.PI*2; const p = (Math.random()-0.5)*Math.PI; const x = Math.cos(t)*Math.cos(p)*r; const y = (Math.sin(p)*r*0.6) + 1.0; const z = Math.sin(t)*Math.cos(p)*r; s.setAttribute("position", `${x} ${y} ${z}`); s.setAttribute("radius", 0.01 + Math.random()*0.015); s.setAttribute("material", `shader: flat; color: #2aa6c9; opacity: ${0.25+Math.random()*0.35}; transparent: true`); stars.appendChild(s); } // Attach palm-pop once hands actually connect const l = document.querySelector("#leftHand"); const r = document.querySelector("#rightHand"); l.addEventListener("controllerconnected", () => l.setAttribute("palm-pop",""), {once:true}); r.addEventListener("controllerconnected", () => r.setAttribute("palm-pop",""), {once:true}); }); </script> </a-scene> </body> </html>
